<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-dark text-white">
  <div id="main-content" class="fade-in">

    <!-- Navbar -->
    <header class="py-3">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <a href="/home.html" class="h3 text-white text-decoration-none fw-bold ms-3">Federica</a>
        <nav>
          <div class="d-flex justify-content-center gap-4 flex-wrap me-3">
            <a href="/projects.html" class="text-white text-decoration-none">Projects</a>
            <a href="/about.html" class="text-white text-decoration-none">About</a>
            <a href="/contact.html" class="text-white text-decoration-none">Contact</a>
          </div>
        </nav>
      </div>
    </header>

    <!-- Intro Section -->
    <section class="intro d-flex align-items-center p-5">
      <div class="profile-img me-4">
        <img src="/assets/website pfp.png" alt="Profile" class="rounded-circle"
          style="width: 200px; height: 200px; object-fit: cover;">
      </div>

      <div class="intro-text">
        <h1>Hi, I'm Federica</h1>
        <h3>UX/UI Designer | Junior Front-End Dev</h3>

        <div class="social-icons d-flex gap-3 mt-3">
          <a href="https://www.linkedin.com/in/federicaziaco/" class="text-white fs-3">
            <i class="fa-brands fa-linkedin"></i>
          </a>
          <a href="https://github.com/feffyx" class="text-white fs-3">
            <i class="fa-brands fa-github"></i>
          </a>
        </div>

        <a href="/assets/federica_ziaco_updated_cv_11-04-2025.pdf" class="btn btn-light mt-3">My CV</a>
      </div>
    </section>

    <!-- Projects Section -->
    <section class="projects p-5">
      <h2 class="mb-4 text-center">Currently working on</h2>
      <div class="project-grid">
        <div class="project-card" onclick="openProjectModal('project1')">
          <img src="/assets/Molly.png" alt="Molly's Canvas" />
          <div class="overlay">Molly's Canvas</div>
        </div>

        <div class="project-card" onclick="openProjectModal('project2')">
          <img src="/assets/Drum.PNG" alt="DrumKit" />
          <div class="overlay">DrumKit</div>
        </div>

        <div class="project-card" onclick="openProjectModal('project4')">
          <img src="/assets/tarotapp.png" alt="Napoli Tarots" />
          <div class="overlay">Napoli Tarots</div>
        </div>

        <div class="project-card" onclick="openProjectModal('project3')">
          <img src="/assets/BetterdaysIcon.png" alt="Better Days" />
          <div class="overlay">Better Days</div>
        </div>
      </div>
    </section>

    <!-- Modal Overlay -->
    <div id="project-modal" class="modal-overlay" onclick="closeProjectModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-title">Project Title</h3>
        <div id="modal-media"></div>
        <p id="modal-description">Here is the project description.</p>
      </div>
    </div>
  </div>

  <!-- JS Modal Logic -->
  <script>

document.querySelector('.profile-img').addEventListener('mousemove', function (e) {
  const profileImgContainer = document.querySelector('.profile-img');
  const profileImg = document.querySelector('.profile-img img');
  const { offsetX, offsetY, target } = e;
  const { clientWidth, clientHeight } = target;

  // Calcola la direzione del movimento
const x = (offsetX / clientWidth) * 150 - 100; // Aumentato il movimento orizzontale
const y = (offsetY / clientHeight) * 150 - 100; // Aumentato il movimento verticale

  // Applica il movimento all'immagine e al contenitore
  profileImg.style.transform = `translate(${x}px, ${y}px)`;
  profileImgContainer.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`; // Movimento del contenitore (frame)
});

document.querySelector('.profile-img').addEventListener('mouseleave', function () {
  // Reset quando il cursore esce dall'immagine
  const profileImg = document.querySelector('.profile-img img');
  const profileImgContainer = document.querySelector('.profile-img');
  profileImg.style.transform = 'translate(0, 0)';
  profileImgContainer.style.transform = 'translate(0, 0)';
});


    function openProjectModal(projectId) {
      const modal = document.getElementById('project-modal');
      const title = document.getElementById('modal-title');
      const desc = document.getElementById('modal-description');
      const media = document.getElementById('modal-media');

      let projectData = {
        title: '',
        description: '',
        images: []
      };

      if (projectId === 'project1') {
        projectData = {
          title: "Molly's Canvas",
          description: "Molly's Canvas is a 2D novel game made with Unity that tells the story of Molly, a girl struggling with an Eating Disorder.",
          images: [
            '/assets/mollyscanvas.jpg',
            '/assets/MollysCanvas.PNG'
          ]
        };
      }

      if (projectId === 'project2') {
        projectData = {
          title: "DrumKit",
          description: "An app that produces sounds of a drumset using hand gestures.",
          images: [
            '/assets/handgesture.mov'
          ]
        };
      }

      if (projectId === 'project3') {
        projectData = {
          title: "Better Days",
          description: "A mood tracker app to help people keep track of their emotional progress.",
          images: [
            '/assets/diaryentry.jpg'
          ]
        };
      }

      if (projectId === 'project4') {
        projectData = {
          title: "Napoli Tarots",
          description: "An app that helps people discover the mysteries and legends of Naples by collecting cards.",
          images: [
            '/assets/tarots.png'
          ]
        };
      }

      title.textContent = projectData.title;
      desc.textContent = projectData.description;
      media.innerHTML = projectData.images
        .map(src => `<img src="${src}" alt="Project Image" style="max-width:100%; margin-bottom: 10px;">`)
        .join('');

      modal.style.display = 'flex';
    }

    function closeProjectModal() {
      document.getElementById('project-modal').style.display = 'none';
    }
  </script>
</body>

</html>
